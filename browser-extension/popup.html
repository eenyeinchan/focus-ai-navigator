<!DOCTYPE html>
<html>
<head>
  <title>Focus Blocker</title>
  <style>
    body {
      width: 300px;
      padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .status {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      text-align: center;
    }
    .active {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .inactive {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    button {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 0.5rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    .primary {
      background: #007bff;
      color: white;
    }
    .secondary {
      background: #6c757d;
      color: white;
    }
    .sites-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 0.5rem;
      margin-top: 0.5rem;
    }
    .site-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.25rem 0;
      border-bottom: 1px solid #eee;
    }
    .site-item:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <h3>Focus AI Navigator</h3>
  <div id="status" class="status inactive">No active focus session</div>

  <button id="refresh" class="secondary">Refresh Status</button>

  <div id="sites-section" style="display: none;">
    <h4>Currently Blocked Sites:</h4>
    <div id="sites-list" class="sites-list"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
